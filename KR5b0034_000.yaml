body:
  text: 太上靈寶智慧觀身經靜觀真人於思微中觀身實相深違智慧了見四大六種根識及五聚蔭五印世法皆悉空寂入無相門所謂外想內想若生想若滅想了了照盡無淨穢法無生滅法如是盡處亦無所盡究皆是空空竟升玄何以故內想者名境觀空是空亦空空空亦空空無分別空故是無分別空亦復皆空空無二致故言其盡若善男女照法空性無起滅心無憍慢心無恐怖心無憎愛心能於世間免種種苦所謂生死别苦鬼神害苦官私口舌苦水火刀兵饒寒苦皆悉免離如是盡利益非於一人二人必於無量無邊無量數人非一天二天無量無邊無量數天其功德力不可思議是故此説名為解脫名利益義名無量義名第一義如是諸義若書若寫若讀若誦若解説是為入智慧門遊智慧室坐智慧牀餐智慧食得智慧真相之體即於爾時説智慧頌曰智慧起本無朗朗照十方結空峙玄霄諸天挹流芳其妙難思議虛成真實通有有有非有無無無不無智慧常觀身學道之所先渺渺入玄津自然録我神天尊常擁護魔王衛寶言晃晃金剛軀超超太上仙智慧生戒根真道戒為主三寶由是興髙仙所崇受泛此不死舟倐忽濟大有當此説戒時諸天來稽首太上靈寶智慧觀身經終
